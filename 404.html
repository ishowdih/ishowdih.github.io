<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Sayfa Bulunamadı | Tadic Tools</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #070a13 0%, #0f1123 100%);
            --card-bg: rgba(22, 28, 45, 0.4);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-normal: #3b82f6;
            --accent-pro: #d946ef;
            --font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: var(--font-family);
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 20px;
        }

        .error-container {
            max-width: 550px;
            width: 100%;
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 28px;
            padding: 60px 40px;
            text-align: center;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            position: relative;
            animation: fadeIn 0.6s ease-out;
        }

        .error-container::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 28px;
            padding: 1.5px;
            background: linear-gradient(to bottom, rgba(255,255,255,0.08), transparent);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .error-code {
            font-size: 6rem;
            font-weight: 900;
            line-height: 1;
            letter-spacing: -0.05em;
            background: linear-gradient(135deg, #60a5fa, #d946ef);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            filter: drop-shadow(0 4px 12px rgba(217, 70, 239, 0.15));
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: -0.02em;
        }

        p {
            color: var(--text-muted);
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 35px;
        }

        .divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.05);
            margin: 20px 0;
            width: 100%;
        }

        .home-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 28px;
            border-radius: 16px;
            font-size: 0.95rem;
            font-weight: 600;
            text-decoration: none;
            color: white;
            background: var(--accent-normal);
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.3);
            cursor: pointer;
        }

        .home-btn:hover {
            transform: translateY(-2px);
            background: #2563eb;
            box-shadow: 0 6px 24px rgba(59, 130, 246, 0.4);
        }

        .home-btn svg {
            transition: transform 0.3s ease;
        }

        .home-btn:hover svg {
            transform: translateX(-3px);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="error-container">
        <div class="error-code">404</div>
        
        <!-- Türkçe Mesaj -->
        <div>
            <h1>Aradığınız sayfa bulunamadı</h1>
            <p>Bağlantı hatalı olabilir veya sayfa kaldırılmış olabilir.</p>
        </div>

        <div class="divider"></div>

        <!-- İngilizce Mesaj -->
        <div>
            <h1>Page not found</h1>
            <p>The link might be broken or the page may have been removed.</p>
        </div>

        <a href="/" class="home-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            <span>Ana Sayfa / Go Home</span>
        </a>
    </div>

</body>
</html>
